query GetTitle($titleId: ID!, $numCredits: Int = 20) {
	title(id: $titleId) {
		id
		titleText {
			text
		}
		originalTitleText {
			text
		}
		primaryImage {
			url
			width
			height
		}
		akas(first: 2) {
			edges {
				node {
					text
				}
			}
		}
		titleType {
			id
			text
			canHaveEpisodes
		}
		genres {
			... on Genres {
				genres {
					text
				}
			}
		}
		series {
			episodeNumber {
				episodeNumber
				seasonNumber
			}
			series {
				id
				titleText {
					text
				}
				originalTitleText {
					text
				}
			}
		}
		episodes {
			episodes(first: 3) {
				total
				edges {
					node {
						id
						titleText {
							text
						}
						series {
							episodeNumber {
								episodeNumber
								seasonNumber
							}
						}
					}
				}
			}
		}
		userRating {
			value
			date
		}
		ratingsSummary {
			aggregateRating
			voteCount
		}
		plots(first: 1) {
			edges {
				node {
					plotText {
						plainText
					}
				}
			}
		}
		genres {
			genres {
				text
			}
		}
		runtime {
			seconds
		}
		releaseYear {
			year
			endYear
		}
		directors: credits(first: 3, filter: {categories: ["director"]}) {
			edges {
				node {
					name {
						id
						nameText {
							text
						}
					}
				}
			}
		}
		creditsV2(
			first: $numCredits,
			filter: {
				creditLevelFilter: {includeTraits: [CAST_TRAIT]}
			}
		) {
			edges {
				node {
					...CreditDetails
				}
			}
		}
	}
}

fragment CreditDetails on CreditV2 {
	name {
		id
		nameText {
			text
		}
		birthDate {
			date
			dateComponents {
				year
			}
		}
	}
	episodeCredits(first: 1) {
		yearRange {
			year
			endYear
		}
	}
	creditedRoles(first: 3) {
		edges {
			node {
				text
				characters(first: 3) {
					edges {
						node {
							name
						}
					}
				}
			}
		}
	}
}

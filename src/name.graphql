query GetName($nameId: ID!, $numCredits : Int = 20) {
	name(id: $nameId) {
		id
		nameText {
			text
		}
		birthDate {
			date
			dateComponents {
				year
			}
		}
		primaryImage {
			url
			width
			height
		}
		creditsV2(
			first: $numCredits,
			creditSort: {by: "LATEST_RELEASE_DATE", order: DESC},
			filter: {
				creditLevelFilter: {includeTraits: [CAST_TRAIT]},
				titleLevelFilter: {excludeGenres: ["Talk-Show", "News"], productionStage: RELEASED}
			}
		) {
			edges {
				node {
					...CreditDetails
				}
			}
		}
		knownForV2 {
			credits {
				...CreditDetails
			}
		}
	}
}

fragment CreditDetails on CreditV2 {
	title {
		...TitleDetails
	}
	episodeCredits(first: 1) {
		yearRange {
			year
			endYear
		}
	}
	creditedRoles(first: 3) {
		edges {
			node {
				text
				characters(first: 3) {
					edges {
						node {
							name
						}
					}
				}
			}
		}
	}
}

fragment TitleDetails on Title {
	id
	titleText {
		text
	}
	originalTitleText {
		text
	}
	primaryImage {
		url
		width
		height
	}
	titleType {
		id
	}
	releaseYear {
		year
		endYear
	}
	userRating {
		value
	}
	ratingsSummary {
		aggregateRating
		voteCount
	}
}
